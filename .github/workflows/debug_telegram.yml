name: Debug Telegram

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check bot identity
        env:
          TELEGRAM_SIGNAL_TOKEN: ${{ secrets.TELEGRAM_SIGNAL_TOKEN }}
        run: |
          echo "=== Bot Info ==="
          curl -s "https://api.telegram.org/bot${TELEGRAM_SIGNAL_TOKEN}/getMe"

      - name: Check chat access
        env:
          TELEGRAM_SIGNAL_TOKEN: ${{ secrets.TELEGRAM_SIGNAL_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== Chat Info ==="
          curl -s "https://api.telegram.org/bot${TELEGRAM_SIGNAL_TOKEN}/getChat?chat_id=${TELEGRAM_CHAT_ID}"

      - name: Try sending message without thread
        env:
          TELEGRAM_SIGNAL_TOKEN: ${{ secrets.TELEGRAM_SIGNAL_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== Send Test (no topic) ==="
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_SIGNAL_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&text=Test+message+from+screener+bot"

      - name: Try sending message to topic
        env:
          TELEGRAM_SIGNAL_TOKEN: ${{ secrets.TELEGRAM_SIGNAL_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: |
          echo "=== Send Test (with topic thread_id=${TELEGRAM_THREAD_ID}) ==="
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_SIGNAL_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&message_thread_id=${TELEGRAM_THREAD_ID}&text=Test+signal+message"
