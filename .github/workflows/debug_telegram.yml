name: Debug Telegram

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Trade Signals topic (thread 5)
        env:
          TELEGRAM_SIGNAL_TOKEN: ${{ secrets.TELEGRAM_SIGNAL_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== Sending to thread_id=5 ==="
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_SIGNAL_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"@sipekhuatstock","message_thread_id":5,"text":"Test to Trade Signals topic"}'

      - name: Send to Track Record topic (thread 14)
        env:
          TELEGRAM_SIGNAL_TOKEN: ${{ secrets.TELEGRAM_SIGNAL_TOKEN }}
        run: |
          echo "=== Sending to thread_id=14 ==="
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_SIGNAL_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"@sipekhuatstock","message_thread_id":14,"text":"Test to Track Record topic"}'
