name: T+2 Stock Screener

on:
  schedule:
    - cron: '30 0 * * 1-5'   # 8:30am MYT (UTC+8) = 00:30 UTC, Mon–Fri
    - cron: '0 6 * * 1-5'    # 2:00pm MYT (UTC+8) = 06:00 UTC, Mon–Fri
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to run'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +"%H")
            if [ "$HOUR" = "00" ]; then
              echo "name=morning" >> $GITHUB_OUTPUT
            else
              echo "name=afternoon" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run screener
        env:
          TELEGRAM_SIGNAL_TOKEN: ${{ secrets.TELEGRAM_SIGNAL_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: python screener_main.py --session ${{ steps.session.outputs.name }}

      - name: Commit tracker DB
        run: |
          git config user.email "actions@github.com"
          git config user.name "Screener Bot"
          git add tracker.db
          if ! git diff --staged --quiet; then
            git commit -m "chore: update tracker.db"
            git pull --rebase origin main
            git push
          fi
