name: News Bot

on:
  schedule:
    - cron: '2 * * * *'   # fire once per hour; inner loop handles 5-min checks
  workflow_dispatch:        # allow manual trigger

concurrency:
  group: news-bot
  cancel-in-progress: false  # serialise runs; never run two at once

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (6 checks × 10 min = 60 min coverage)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "News Bot"
          for i in $(seq 1 6); do
            echo "--- Check $i/6 ---"
            python run_once.py
            git add seen_articles.db
            if ! git diff --staged --quiet; then
              git commit -m "chore: update seen articles"
              git pull --rebase origin main
              git push
            fi
            [ $i -lt 6 ] && sleep 600
          done
