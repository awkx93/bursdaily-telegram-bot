name: T+2 Track Record

on:
  schedule:
    - cron: '30 9 * * 1-5'   # 5:30pm MYT = 09:30 UTC daily Mon–Fri (close T+2)
    - cron: '0 0 * * 1'      # 8:00am MYT = 00:00 UTC every Monday (weekly summary)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to run'
        required: true
        default: 'close'
        type: choice
        options:
          - close
          - weekly

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +"%H")
            MIN=$(date -u +"%M")
            DAY=$(date -u +"%u")
            if [ "$HOUR" = "00" ] && [ "$DAY" = "1" ]; then
              echo "name=weekly" >> $GITHUB_OUTPUT
            else
              echo "name=close" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TRACK_RECORD_THREAD_ID: ${{ secrets.TELEGRAM_TRACK_RECORD_THREAD_ID }}
        run: python tracker_main.py --mode ${{ steps.mode.outputs.name }}

      - name: Commit tracker DB
        run: |
          git config user.email "actions@github.com"
          git config user.name "Track Record Bot"
          git add tracker.db
          if ! git diff --staged --quiet; then
            git commit -m "chore: update tracker.db"
            git pull --rebase origin main
            git push
          fi
